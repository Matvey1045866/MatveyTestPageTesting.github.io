<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ChatGChat (ЧатGЧат) 👑</title>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        /* модалка входа */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            border-radius: 48px;
            padding: 32px 28px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            animation: popIn 0.4s ease;
            border: 3px solid rgba(255,255,255,0.5);
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h2 {
            background: linear-gradient(112deg, #4158D0, #C850C0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: 2px;
        }

        .modal h3 {
            color: #4a2b6e;
            text-align: center;
            margin-bottom: 24px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .user-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .user-btn {
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #f0e6ff, #e0d0ff);
            color: #4a2b6e;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 100%;
            position: relative;
            border: 2px solid transparent;
        }

        .user-btn:hover:not(.disabled) {
            transform: scale(1.02);
            background: linear-gradient(145deg, #e5d5ff, #d0bcff);
            box-shadow: 0 10px 20px rgba(159, 122, 234, 0.3);
            border-color: #b38cfa;
        }

        .user-btn.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.4);
            background: #e0e0e0;
        }

        .user-btn .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(145deg, #b38cfa, #9f7aea);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            flex-shrink: 0;
            text-transform: uppercase;
            background-size: cover;
            background-position: center;
        }

        /* Специальные цвета для аватарок */
        .user-btn[data-username="Полина"] .avatar {
            background: linear-gradient(145deg, #ff9a9e, #fad0c4);
        }

        .user-btn[data-username="Раяна"] .avatar {
            background: linear-gradient(145deg, #a18cd1, #fbc2eb);
        }

        .user-btn[data-username="Мадина"] .avatar {
            background: linear-gradient(145deg, #96fbc4, #f9f586);
        }

        .user-btn[data-username="Даша"] .avatar {
            background: linear-gradient(145deg, #fbc2eb, #a6c1ee);
        }

        .user-btn[data-username="Матвей (владелец сайта)"] .avatar {
            background: linear-gradient(145deg, #ff9a9e, #fecfef);
            border: 3px solid gold;
            box-shadow: 0 0 15px gold;
        }

        .online-badge {
            margin-left: auto;
            background: #4caf50;
            color: white;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .offline-badge {
            margin-left: auto;
            background: #9e9e9e;
            color: white;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
        }

        /* основной интерфейс */
        .messenger-app {
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            background: white;
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.3s;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .messenger-app.visible {
            opacity: 1;
        }

        .header {
            background: linear-gradient(112deg, #4158D0, #C850C0, #FFCC70);
            padding: 16px 28px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header h1 small {
            font-size: 1rem;
            opacity: 0.8;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
        }

        .username-display {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: #faf5ff;
            border-right: 2px solid #e9d9ff;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 2px solid #e9d9ff;
        }

        .create-group-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(112deg, #4158D0, #C850C0);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 16px;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .create-group-btn:hover {
            transform: scale(1.02);
            border-color: white;
            box-shadow: 0 10px 20px rgba(193, 80, 192, 0.4);
        }

        .add-user-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(112deg, #FFCC70, #FFA07A);
            color: #4a2b6e;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 16px;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .add-user-btn:hover {
            transform: scale(1.02);
            border-color: white;
            box-shadow: 0 10px 20px rgba(255, 160, 122, 0.4);
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 4px;
            position: relative;
        }

        .user-item:hover {
            background: #efe3ff;
        }

        .user-item.selected {
            background: #e2d0ff;
            border: 2px solid #b38cfa;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(145deg, #b38cfa, #9f7aea);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.3rem;
            text-transform: uppercase;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }

        .user-name {
            font-weight: 600;
            color: #3f2e5f;
            font-size: 1.1rem;
            flex: 1;
        }

        .user-role {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 40px;
            background: #b38cfa;
            color: white;
            margin-left: 8px;
        }

        .user-role.admin {
            background: gold;
            color: #4a2b6e;
        }

        .user-role.banned {
            background: #f44336;
        }

        .online-status {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 0 2px white;
        }

        .offline-status {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #9e9e9e;
            box-shadow: 0 0 0 2px white;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            position: relative;
        }

        .chat-header {
            padding: 24px 28px;
            border-bottom: 2px solid #f0e6ff;
            font-weight: 700;
            font-size: 1.5rem;
            color: #3f2e5f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .admin-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .edit-user-btn {
            background: #b38cfa;
            color: white;
        }

        .edit-user-btn:hover {
            background: #9f6eff;
            transform: scale(1.05);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 14px 22px;
            border-radius: 30px;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.incoming {
            align-self: flex-start;
            background: #f0e6ff;
            border-bottom-left-radius: 6px;
        }

        .message.outgoing {
            align-self: flex-end;
            background: linear-gradient(112deg, #b38cfa, #9f7aea);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message-sender {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-time {
            font-size: 0.7rem;
            text-align: right;
            margin-top: 4px;
            opacity: 0.7;
        }

        .input-area {
            padding: 20px 28px;
            border-top: 2px solid #f0e6ff;
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: #f7f2fe;
            border-radius: 40px;
            padding: 8px 24px;
            border: 2px solid #e3d5fc;
        }

        .message-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 1rem;
            padding: 12px 0;
            outline: none;
            resize: none;
            max-height: 120px;
        }

        .send-button {
            background: linear-gradient(112deg, #4158D0, #C850C0);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .send-button:hover {
            transform: scale(1.1) rotate(360deg);
            box-shadow: 0 10px 20px rgba(193, 80, 192, 0.4);
        }

        .empty-state {
            text-align: center;
            color: #b7a4d4;
            padding: 50px;
            font-size: 1.2rem;
        }

        /* модалки */
        .group-modal, .user-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 48px;
            width: 90%;
            max-width: 500px;
            border: 3px solid rgba(193, 80, 192, 0.3);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            background: linear-gradient(112deg, #4158D0, #C850C0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            font-size: 2rem;
            font-weight: 700;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            border: 2px solid #e0d0ff;
            border-radius: 60px;
            margin-bottom: 16px;
            outline: none;
        }

        .modal-content input:focus, .modal-content select:focus {
            border-color: #C850C0;
        }

        .modal-content label {
            display: block;
            margin-bottom: 8px;
            color: #4a2b6e;
            font-weight: 600;
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 10px auto 20px;
            background: linear-gradient(145deg, #b38cfa, #9f7aea);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: 600;
            background-size: cover;
            background-position: center;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            justify-content: center;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
            border-color: #4a2b6e;
        }

        .color-option.selected {
            border-color: gold;
            transform: scale(1.1);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .save-btn {
            background: linear-gradient(112deg, #4158D0, #C850C0);
            color: white;
        }

        .save-btn:hover {
            transform: scale(1.05);
        }

        .delete-btn {
            background: #f44336;
            color: white;
        }

        .delete-btn:hover {
            background: #d32f2f;
        }

        .cancel-btn {
            background: #e0d0ff;
            color: #4a2b6e;
        }

        .cancel-btn:hover {
            background: #d0bcff;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(112deg, #ff6b6b, #f44336);
            color: white;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(244, 67, 54, 0.4);
            z-index: 3000;
            animation: slideUp 0.3s ease;
            display: none;
            border: 2px solid white;
        }

        .success-toast {
            background: linear-gradient(112deg, #4caf50, #45a049);
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .owner-crown {
            margin-left: 5px;
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px gold);
        }
    </style>
</head>
<body>
    <!-- тост для уведомлений -->
    <div class="toast" id="toast"></div>

    <!-- модалка входа -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <h2>ChatGChat</h2>
            <h3>ЧатGЧат</h3>
            <div class="user-buttons" id="userButtons">
                <!-- кнопки будут сгенерированы динамически -->
            </div>
            <p style="text-align: center; color: #8f7aaa; font-size: 0.9rem;">Выбери своё имя чтобы войти</p>
        </div>
    </div>

    <!-- модалка создания группы -->
    <div class="group-modal" id="groupModal">
        <div class="modal-content">
            <h3>Новая группа</h3>
            <input type="text" id="groupNameInput" placeholder="Название группы">
            <div class="modal-buttons">
                <button class="cancel-btn" id="cancelGroupBtn">Отмена</button>
                <button class="save-btn" id="createGroupBtn">Создать</button>
            </div>
        </div>
    </div>

    <!-- модалка создания/редактирования пользователя (только для админа) -->
    <div class="user-modal" id="userModal">
        <div class="modal-content">
            <h3 id="userModalTitle">Создание пользователя</h3>
            
            <label>Аватар (цвет или URL картинки)</label>
            <div class="color-picker" id="colorPicker">
                <div class="color-option selected" style="background: linear-gradient(145deg, #ff9a9e, #fad0c4);" data-color1="#ff9a9e" data-color2="#fad0c4"></div>
                <div class="color-option" style="background: linear-gradient(145deg, #a18cd1, #fbc2eb);" data-color1="#a18cd1" data-color2="#fbc2eb"></div>
                <div class="color-option" style="background: linear-gradient(145deg, #96fbc4, #f9f586);" data-color1="#96fbc4" data-color2="#f9f586"></div>
                <div class="color-option" style="background: linear-gradient(145deg, #fbc2eb, #a6c1ee);" data-color1="#fbc2eb" data-color2="#a6c1ee"></div>
                <div class="color-option" style="background: linear-gradient(145deg, #ff9a9e, #fecfef);" data-color1="#ff9a9e" data-color2="#fecfef"></div>
            </div>
            
            <div class="avatar-preview" id="avatarPreview">👤</div>
            
            <input type="text" id="avatarUrlInput" placeholder="Или вставьте URL картинки">
            
            <label>Ник пользователя</label>
            <input type="text" id="usernameInput" placeholder="Введите ник">
            
            <label>Роль</label>
            <select id="roleSelect">
                <option value="user">Обычный пользователь</option>
                <option value="admin">Администратор</option>
                <option value="banned">Заблокирован</option>
            </select>
            
            <label>Доступ</label>
            <select id="accessSelect">
                <option value="full">Полный доступ</option>
                <option value="readonly">Только чтение</option>
                <option value="no">Нет доступа</option>
            </select>
            
            <div class="modal-buttons">
                <button class="cancel-btn" id="cancelUserBtn">Отмена</button>
                <button class="delete-btn" id="deleteUserBtn" style="display: none;">Удалить</button>
                <button class="save-btn" id="saveUserBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- основной интерфейс -->
    <div class="messenger-app" id="messengerApp">
        <div class="header">
            <h1>ChatGChat <small>ЧатGЧат</small></h1>
            <div class="user-info" id="userInfo">
                <span class="username-display" id="usernameDisplay"></span>
                <button class="logout-btn" id="logoutBtn">Выйти</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="sidebar">
                <div class="sidebar-header">
                    <button class="create-group-btn" id="showGroupModalBtn">➕ Создать группу</button>
                    <button class="add-user-btn" id="showAddUserBtn" style="display: none;">👑 Добавить пользователя</button>
                </div>
                <div class="users-list" id="usersList">
                    <!-- список пользователей -->
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-header" id="chatHeader">
                    <span id="chatTitle">Выбери собеседника</span>
                    <div class="admin-controls" id="adminControls" style="display: none;">
                        <button class="admin-btn edit-user-btn" id="editUserBtn">✏️ Редактировать</button>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    <div class="empty-state">👋 Напиши кому-нибудь!</div>
                </div>
                <div class="input-area" id="inputArea" style="display: none;">
                    <div class="input-wrapper">
                        <textarea class="message-input" id="messageInput" placeholder="Написать..." rows="1"></textarea>
                    </div>
                    <button class="send-button" id="sendButton">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>

        // Загрузка сообщений
        async function loadMessages() {
            if (!currentChatId) return;

            try {
                let query = supabase
                    .from('messages')
                    .select(`
                        *,
                        users:sender_id (
                            username,
                            role,
                            avatar_url,
                            avatar_color1,
                            avatar_color2
                        )
                    `)
                    .order('created_at', { ascending: true });

                if (currentChatType === 'user') {
                    query = query.or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentChatId}),and(sender_id.eq.${currentChatId},receiver_id.eq.${currentUser.id})`)
                        .is('group_id', null);
                }

                const { data: messages, error } = await query;

                if (error) throw error;

                renderMessages(messages || []);
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        // Рендер сообщений
        function renderMessages(messages) {
            if (messages.length === 0) {
                messagesContainer.innerHTML = '<div class="empty-state">Напишите первое сообщение ✨</div>';
                return;
            }

            let html = '';
            messages.forEach(msg => {
                const isOutgoing = msg.sender_id === currentUser.id;
                const msgClass = isOutgoing ? 'outgoing' : 'incoming';
                let senderName = msg.users?.username || 'Неизвестно';
                
                if (senderName === 'Матвей (владелец сайта)') {
                    senderName = 'Матвей 👑';
                }
                
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                html += `
                    <div class="message ${msgClass}">
                        ${!isOutgoing ? `<div class="message-sender">${senderName}</div>` : ''}
                        <div class="message-text">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            });

            messagesContainer.innerHTML = html;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Отправка сообщения
        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content || !currentChatId) return;

            try {
                const messageData = {
                    sender_id: currentUser.id,
                    content: content,
                    receiver_id: currentChatId,
                    created_at: new Date()
                };

                const { error } = await supabase
                    .from('messages')
                    .insert([messageData]);

                if (error) throw error;

                messageInput.value = '';
                messageInput.style.height = 'auto';
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        // Подписка на новые сообщения
        function setupMessagesSubscription() {
            if (messagesSubscription) {
                messagesSubscription.unsubscribe();
            }

            if (!currentChatId) return;

            const filter = `and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentChatId}),and(sender_id.eq.${currentChatId},receiver_id.eq.${currentUser.id})`;

            messagesSubscription = supabase
                .channel('messages')
                .on('postgres_changes', 
                    { 
                        event: 'INSERT', 
                        schema: 'public', 
                        table: 'messages',
                        filter: `or(${filter})`
                    },
                    async (payload) => {
                        const { data } = await supabase
                            .from('messages')
                            .select(`
                                *,
                                users:sender_id (
                                    username
                                )
                            `)
                            .eq('id', payload.new.id)
                            .single();

                        if (data) {
                            const isOutgoing = data.sender_id === currentUser.id;
                            const msgClass = isOutgoing ? 'outgoing' : 'incoming';
                            let senderName = data.users?.username || 'Неизвестно';
                            
                            if (senderName === 'Матвей (владелец сайта)') {
                                senderName = 'Матвей 👑';
                            }
                            
                            const time = new Date(data.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                            
                            const msgHtml = `
                                <div class="message ${msgClass}">
                                    ${!isOutgoing ? `<div class="message-sender">${senderName}</div>` : ''}
                                    <div class="message-text">${escapeHtml(data.content)}</div>
                                    <div class="message-time">${time}</div>
                                </div>
                            `;
                            
                            if (messagesContainer.innerHTML.includes('empty-state')) {
                                messagesContainer.innerHTML = msgHtml;
                            } else {
                                messagesContainer.insertAdjacentHTML('beforeend', msgHtml);
                            }
                            messagesContainer.scrollTop = messagesContainer.scrollHeight;
                        }
                    }
                )
                .subscribe();
        }

        // Подписка на изменения статусов
        function setupRealtimeSubscriptions() {
            supabase
                .channel('users')
                .on('postgres_changes', 
                    { event: 'UPDATE', schema: 'public', table: 'users' },
                    (payload) => {
                        if (currentUser && payload.new.id !== currentUser.id) {
                            loadUsersAndGroups();
                        }
                        renderUserButtons();
                    }
                )
                .subscribe();
        }

        // Сохранить пользователя
        async function saveUser() {
            const username = usernameInput.value.trim();
            if (!username) {
                showToast('Введите ник пользователя');
                return;
            }

            const userData = {
                username: username,
                avatar_url: avatarUrlInput.value.trim() || null,
                avatar_color1: selectedColor.color1,
                avatar_color2: selectedColor.color2,
                role: roleSelect.value,
                access: accessSelect.value,
                updated_at: new Date()
            };

            try {
                if (editingUserId) {
                    // Обновление существующего
                    const { error } = await supabase
                        .from('users')
                        .update(userData)
                        .eq('id', editingUserId);
                    
                    if (error) throw error;
                    showToast('Пользователь обновлен!', true);
                } else {
                    // Создание нового
                    userData.created_at = new Date();
                    userData.is_online = false;
                    
                    const { error } = await supabase
                        .from('users')
                        .insert([userData]);
                    
                    if (error) throw error;
                    showToast('Пользователь создан!', true);
                    
                    // Добавляем в BASE_USERS для отображения
                    BASE_USERS.push({ username: username, avatar: username.charAt(0), role: roleSelect.value, access: accessSelect.value });

                userModal.style.display = 'none';
                loadUsersAndGroups();
                renderUserButtons();

                console.error('Error saving user:', error);
                showToast('Ошибка сохранения');
            }
        }

            registerModal.style.display = 'flex';
            messengerApp.classList.remove('visible');
            
            renderUserButtons();
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Проверка сессии
        async function checkSession() {
            await ensureUsersExist();
            
            const savedUser = localStorage.getItem('chat_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    
                    const { data, error } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', user.id)
                        .single();
                    
                    if (data && data.is_online) {
                        localStorage.removeItem('chat_user');
                        await renderUserButtons();
                        registerModal.style.display = 'flex';
                        return;
                    }
                    
                    if (data) {
                        await supabase
                            .from('users')
                            .update({ 
                                is_online: true,
                                last_seen: new Date()
                            })
                            .eq('id', user.id);
                            
                        currentUser = data;
                        usernameDisplay.textContent = data.username === 'Матвей (владелец сайта)' 
                            ? 'Матвей 👑' 
                            : data.username;
                        registerModal.style.display = 'none';
                        messengerApp.classList.add('visible');
                        
                        if (data.username === 'Матвей (владелец сайта)') {
                            showAddUserBtn.style.display = 'block';
                        }
                        
                        loadUsersAndGroups();
                        setupRealtimeSubscriptions();
                        startOnlinePing();
                        return;
                    }
                } catch (e) {
                    console.error('Session error:', e);
                }
            }
            
            await renderUserButtons();
            registerModal.style.display = 'flex';
        }

        // Обработчики
        sendButton.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        logoutBtn.addEventListener('click', logout);

        showGroupModalBtn.addEventListener('click', () => {
            groupModal.style.display = 'flex';
        });

        cancelGroupBtn.addEventListener('click', () => {
            groupModal.style.display = 'none';
            groupNameInput.value = '';
        });

        createGroupBtn.addEventListener('click', createGroup);

        showAddUserBtn.addEventListener('click', openCreateUserModal);

        editUserBtn.addEventListener('click', openEditUserModal);

        saveUserBtn.addEventListener('click', saveUser);

        deleteUserBtn.addEventListener('click', deleteUser);

        cancelUserBtn.addEventListener('click', () => {
            userModal.style.display = 'none';
        });

        // Закрытие модалок по клику вне
        window.addEventListener('click', (e) => {
            if (e.target === groupModal) {
                groupModal.style.display = 'none';
            }
            if (e.target === userModal) {
                userModal.style.display = 'none';
            }
        });

        // Запуск
        checkSession();

        // При закрытии вкладки
        window.addEventListener('beforeunload', async () => {
            if (currentUser) {
                await supabase
                    .from('users')
                    .update({ 
                        is_online: false,
                        last_seen: new Date()
                    })
                    .eq('id', currentUser.id);
            }
        });

        // Периодическая проверка статусов
        setInterval(() => {
            if (!currentUser) {
                renderUserButtons();
            }
        }, 10000);
    </script>
</body>
</html>
