<html>
<head>
    <style>
        /* Стили для браузера */
        #browser {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        
        /* Панель навигации */
        .nav-bar {
            background: #f0f0f0;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        /* Индикатор загрузки */
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Адресная строка */
        #urlInput {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-size: 14px;
        }
        
        #urlInput:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }
        
        /* Кнопка "Начать" */
        .go-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #007bff;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }
        
        .go-button:hover {
            background-color: #0056b3;
        }
        
        /* Контейнер для iframe */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            background: white;
        }
        
        /* Iframe */
        #webFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        /* Статус бар */
        .status-bar {
            background: #f0f0f0;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #ddd;
        }
        
        /* Быстрые ссылки */
        .quick-links {
            max-width: 800px;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        
        .links-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .quick-link {
            padding: 8px 15px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
        }
        
        .quick-link:hover {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
    </style>
</head>
<body>

<div id="browser">
    <!-- Панель навигации -->
    <div class="nav-bar">
        <!-- Индикатор загрузки (скрыт по умолчанию) -->
        <div id="loadingIndicator" class="loader" style="display: none;"></div>
        
        <!-- Адресная строка -->
        <input
            id="urlInput"
            type="text"
            value="https://example.com"
            placeholder="Введите URL или поисковый запрос..."
            onkeypress="if(event.key==='Enter') navigate()"
        >
        
        <!-- Кнопка "Начать" -->
        <button class="go-button" onclick="navigate()">→</button>
    </div>
    
    <!-- Контейнер с iframe -->
    <div class="iframe-container">
        <iframe
            id="webFrame"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"
            allow="fullscreen"
            src="https://example.com"
        ></iframe>
    </div>
    
    <!-- Статус бар -->
    <div class="status-bar">
        <span id="statusText">Готово</span>
        <span id="securityStatus">🔒 Безопасное соединение</span>
    </div>
</div>

<!-- Быстрые ссылки -->
<div class="quick-links">
    <h4>📌 Быстрые ссылки:</h4>
    <div class="links-container">
        <a class="quick-link" onclick="loadUrl('https://google.com')">Google</a>
        <a class="quick-link" onclick="loadUrl('https://youtube.com')">YouTube</a>
        <a class="quick-link" onclick="loadUrl('https://github.com')">GitHub</a>
        <a class="quick-link" onclick="loadUrl('https://wikipedia.org')">Wikipedia</a>
        <a class="quick-link" onclick="loadUrl('https://bing.com')">Bing</a>
        <a class="quick-link" onclick="loadUrl('https://duckduckgo.com')">DuckDuckGo</a>
    </div>
</div>

<script>
// Получаем элементы
const iframe = document.getElementById('webFrame');
const urlInput = document.getElementById('urlInput');
const loadingIndicator = document.getElementById('loadingIndicator');
const statusText = document.getElementById('statusText');
const securityStatus = document.getElementById('securityStatus');

// История навигации
let history = [];
let historyIndex = -1;

// Функция форматирования URL
function formatUrl(input) {
    input = input.trim();
    
    // Если это поисковый запрос (нет точки и не похож на URL)
    if (!input.includes('.') && !input.includes('://') && !input.includes('/')) {
        return `https://www.google.com/search?q=${encodeURIComponent(input)}`;
    }
    
    // Добавляем протокол если его нет
    if (!input.startsWith('http://') && !input.startsWith('https://')) {
        return 'https://' + input;
    }
    
    return input;
}

// Обновление статуса безопасности
function updateSecurityStatus(url) {
    if (url.startsWith('https://')) {
        securityStatus.innerHTML = '🔒 Безопасное соединение';
        securityStatus.style.color = '#28a745';
    } else if (url.startsWith('http://')) {
        securityStatus.innerHTML = '⚠️ Небезопасное соединение';
        securityStatus.style.color = '#dc3545';
    } else {
        securityStatus.innerHTML = '🔒 Безопасное соединение';
        securityStatus.style.color = '#28a745';
    }
}

// Показать/скрыть индикатор загрузки
function setLoading(isLoading) {
    if (isLoading) {
        loadingIndicator.style.display = 'inline-block';
        statusText.textContent = 'Загрузка...';
    } else {
        loadingIndicator.style.display = 'none';
        statusText.textContent = 'Готово';
    }
}

// Навигация
function navigate() {
    const input = urlInput.value;
    if (!input) return;
    
    const url = formatUrl(input);
    loadUrl(url);
}

// Загрузка URL в iframe
function loadUrl(url) {
    // Обновляем адресную строку
    urlInput.value = url;
    
    // Добавляем в историю
    if (historyIndex === -1 || history[historyIndex] !== url) {
        history = history.slice(0, historyIndex + 1);
        history.push(url);
        historyIndex++;
    }
    
    // Показываем индикатор загрузки
    setLoading(true);
    
    // Обновляем статус безопасности
    updateSecurityStatus(url);
    
    // Загружаем страницу
    iframe.src = url;
}

// Обработчик загрузки iframe
iframe.onload = function() {
    setLoading(false);
    
    try {
        // Пытаемся получить заголовок страницы
        const title = iframe.contentDocument.title;
        if (title) {
            statusText.textContent = `Загружено: ${title}`;
        }
    } catch (e) {
        // Игнорируем CORS ошибки
        statusText.textContent = 'Страница загружена';
    }
};

// Обработчик ошибок iframe
iframe.onerror = function() {
    setLoading(false);
    statusText.textContent = 'Ошибка загрузки';
    alert('Не удалось загрузить страницу. Проверьте URL и попробуйте снова.');
};

// Функции навигации
function goBack() {
    if (historyIndex > 0) {
        historyIndex--;
        loadUrl(history[historyIndex]);
    }
}

function goForward() {
    if (historyIndex < history.length - 1) {
        historyIndex++;
        loadUrl(history[historyIndex]);
    }
}

function refresh() {
    if (iframe.src) {
        setLoading(true);
        iframe.src = iframe.src;
    }
}

// Инициализация
window.onload = function() {
    // Загружаем начальную страницу
    if (!iframe.src || iframe.src === 'about:blank') {
        loadUrl('https://example.com');
    }
};
</script>

<!-- Добавляем кнопки навигации (назад/вперед/обновить) -->
<div style="max-width: 800px; margin: 10px auto; display: flex; gap: 10px;">
    <button onclick="goBack()" style="padding: 8px 15px; cursor: pointer;">← Назад</button>
    <button onclick="goForward()" style="padding: 8px 15px; cursor: pointer;">Вперед →</button>
    <button onclick="refresh()" style="padding: 8px 15px; cursor: pointer;">↻ Обновить</button>
</div>

</body>
</html>
